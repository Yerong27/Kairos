<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kairos Job Agent</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="brand">
      <div class="brand-mark" aria-hidden="true">K</div>
      <div>
        <h1>Kairos</h1>
        <p>Job fit, saved to Notion.</p>
      </div>
      <span class="local-badge">Local</span>
    </header>

    <main>
      <section class="card" id="notion-section">
        <div class="card-heading">
          <span class="step">1</span>
          <h2>Notion</h2>
        </div>
        <div class="compact-row">
          <div class="status-line">
            <span id="notion-dot" class="status-dot"></span>
            <div class="status-copy">
              <strong id="notion-status">Checking connection…</strong>
              <span id="db-name"></span>
            </div>
          </div>
          <button id="connect-btn" class="button secondary compact-action">Connect</button>
        </div>
        <div id="notion-msg" class="message" aria-live="polite"></div>
      </section>

      <section class="card" id="resume-section">
        <div class="card-heading">
          <span class="step">2</span>
          <h2>Resume</h2>
        </div>
        <div class="compact-row">
          <div class="status-line">
            <span id="resume-dot" class="status-dot"></span>
            <div class="status-copy">
              <strong id="resume-status">Checking resume…</strong>
              <span id="resume-meta"></span>
            </div>
          </div>
          <input type="file" id="resume-file" accept=".pdf,.docx,.txt" class="file-input" />
          <button id="upload-btn" class="button secondary compact-action" type="button">Choose file</button>
        </div>
        <div id="upload-msg" class="message" aria-live="polite"></div>
      </section>

      <section class="card analyze-card" id="analyze-section">
        <div class="card-heading">
          <span class="step">3</span>
          <div><h2>Analyze job</h2><p>Open a LinkedIn job page first</p></div>
        </div>
        <button id="analyze-btn" class="button analyze-button">Analyze LinkedIn job <span aria-hidden="true">→</span></button>
        <div id="analyze-msg" class="message" aria-live="polite"></div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
