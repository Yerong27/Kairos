<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Upload Resume</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="section">
      <div class="title">Upload Resume</div>
      <div id="status" class="muted">Checking token...</div>
      <div class="row">
        <input type="file" id="resume-file" accept=".txt,.pdf" />
        <button id="upload-btn">Upload</button>
      </div>
      <div id="upload-msg" class="muted"></div>
    </div>
    <script src="upload.js"></script>
  </body>
</html>
